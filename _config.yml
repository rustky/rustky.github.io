# Site settings
title: "Data Scientist Portfolio"
description: "Personal portfolio of a data scientist showcasing projects, research, and insights"
url: "https://rustky.github.io"
baseurl: ""
repository: "rustky/rustky.github.io"

# Author information
author:
  name: "Kyle Rust"
  email: "kyle.rust@outlook.com"
  github: "rustky"
  linkedin: "kyle-rust-0256351b3"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate-v2
  - jekyll-lunr-js-search

# Pagination
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Search settings
lunr_search:
  js_dir: assets/js
  index_file: search.json

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - .bundle

# Include files
include:
  - _pages
