<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
</head>
<body>
  {% include navigation.html %}

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. All rights reserved.</p>
        <div class="social-links">
          {% if site.author.github %}
            <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
          {% endif %}
          {% if site.author.linkedin %}
            <a href="https://linkedin.com/in/{{ site.author.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
          {% endif %}
          {% if site.author.email %}
            <a href="mailto:{{ site.author.email }}">Email</a>
          {% endif %}
        </div>
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/lunr-search.js' | relative_url }}"></script>
</body>
</html>
